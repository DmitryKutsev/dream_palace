name: Deploy
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - name: Deploy hosted ADK agent
        run: |
          gcloud run deploy dream-palace \
            --source . \
            --region "${{ vars.GCP_REGION }}" \
            --service-account "${{ secrets.GCP_SERVICE_ACCOUNT }}" \
            --set-secrets "CLERK_BOT_TOKEN=clerk-bot-token:latest,DREAMER_BOT_TOKEN=dreamer-bot-token:latest,WEBHOOK_SECRET=telegram-webhook-secret:latest" \
            --set-env-vars "GOOGLE_CLOUD_PROJECT=${{ vars.GCP_PROJECT }},FIREBASE_STORAGE_BUCKET=${{ vars.FIREBASE_STORAGE_BUCKET }},ADMIN_TELEGRAM_IDS=${{ vars.ADMIN_TELEGRAM_IDS }}" \
            --allow-unauthenticated
